<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="45%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#1C1508"/>
      <stop offset="100%" stop-color="#0C0C0F"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: dark rounded square, warm amber undertone -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Geometric R lettermark -->
  <g stroke="#F5A623" stroke-width="52" fill="none" stroke-linecap="round" filter="url(#glow)">
    <!-- Stem: full vertical stroke -->
    <line x1="182" y1="118" x2="182" y2="394"/>
    <!-- Bowl: symmetric D-curve, top of stem to midpoint -->
    <path d="M 182 118 C 378 118 378 264 182 264"/>
    <!-- Leg: diagonal from bowl junction to bottom right -->
    <line x1="220" y1="264" x2="366" y2="394"/>
  </g>
</svg>
